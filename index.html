<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本格請求書アプリ</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="app-container">
        <h2>請求書メーカー</h2>

        <div class="input-section">
            <h3>🏢 自社情報（自動保存）</h3>
            <input type="text" id="myZip" placeholder="〒 (例: 000-0000)">
            <input type="text" id="myAddress" placeholder="住所 (例: 東京都〇〇区...)">
            <input type="text" id="myCompany" placeholder="会社名・代表者名">
            <input type="text" id="myPhone" placeholder="電話番号 (任意)">
            <input type="email" id="myEmail" placeholder="メールアドレス (任意)">
        </div>

        <div class="input-section">
            <h3>📝 請求情報</h3>
            <label>発行日 (空欄なら今日):</label>
            <input type="date" id="issueDate">

            <label>請求先名:</label>
            <input type="text" id="clientName" placeholder="例: 株式会社山田商事">

            <label>品目リスト:</label>
            <table class="input-table">
                <thead>
                    <tr>
                        <th style="width: 35%;">品名</th>
                        <th style="width: 20%;">単価</th>
                        <th style="width: 15%;">数量</th>
                        <th style="width: 20%;">税率</th>
                        <th style="width: 10%;"></th>
                    </tr>
                </thead>
                <tbody id="input-items-body">
                    <tr>
                        <td><input type="text" class="item-name" placeholder="例: Web制作"></td>
                        <td><input type="number" class="item-price" placeholder="単価"></td>
                        <td><input type="number" class="item-qty" placeholder="数量" value="1"></td>
                        <td>
                            <select class="item-tax">
                                <option value="0.1">10%</option>
                                <option value="0.08">8%</option>
                                <option value="0">対象外</option>
                            </select>
                        </td>
                        <td><button type="button" class="delete-btn" onclick="removeRow(this)">×</button></td>
                    </tr>
                </tbody>
            </table>
            <button type="button" class="add-btn" onclick="addRow()">+ 品目を追加する</button>
        </div>

        <button class="main-btn" onclick="generatePDF()">この内容でPDFを作成する</button>
    </div>

    <div id="invoice-layout" class="invoice-box" style="display: none;">
        <h1 class="invoice-title">請求書</h1>
        <div class="header-info">
            <div class="client-info">
                <h2 id="pdf-client">〇〇様</h2>
                <p>下記の通りご請求申し上げます。</p>
                <div class="total-box">
                    <span>ご請求金額</span>
                    <span id="pdf-amount" class="price">¥0 -</span>
                </div>
            </div>
            <div class="my-info">
                <p>発行日: <span id="pdf-date">202X年X月X日</span></p>
                <p id="pdf-zip">〒</p>
                <p id="pdf-address">住所</p>
                <h3 id="pdf-company">会社名</h3>
                <p id="pdf-phone">TEL: </p>
                <p id="pdf-email">Email: </p>
            </div>
        </div>
        <table class="item-table">
            <thead>
                <tr>
                    <th>品名</th>
                    <th>単価</th>
                    <th>数量</th>
                    <th>税率</th>
                    <th>金額</th>
                </tr>
            </thead>
            <tbody id="pdf-items">
                </tbody>
            <tfoot>
                <tr>
                    <td colspan="4" class="text-right fw-bold">小計</td>
                    <td id="pdf-subtotal" class="fw-bold">¥0</td>
                </tr>
                <tr id="pdf-tax-row">
                    <td colspan="4" class="text-right fw-bold">消費税</td>
                    <td id="pdf-tax" class="fw-bold">¥0</td>
                </tr>
                <tr>
                    <td colspan="4" class="text-right fw-bold total-color">合計金額</td>
                    <td id="pdf-total" class="fw-bold total-color">¥0</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <script src="main.js"></script>
</body>
</html>
